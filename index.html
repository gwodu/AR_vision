<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>the raise</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
</head>
<body>
  <!-- Landing -->
  <div id="landing" class="screen active">
    <div class="wrap">
      <div class="hero">
        <div class="leaf" aria-hidden="true">🌿</div>
        <h1>the raise</h1>
        <p class="lead">A quiet space to practice a conversation that matters.</p>
        <p class="sub">You've done the work. Now find the right words with Alex.</p>

        <button id="btn-start" class="cta">Begin</button>
      </div>

      <div class="context">
        <p>18 months of strong performance.<br>Time to talk about your future.</p>
      </div>
    </div>
  </div>

  <!-- Main Experience -->
  <div id="scene-container" class="screen">
    <a-scene
      id="main-scene"
      renderer="colorManagement: true; antialias: true; alpha: false"
      vr-mode-ui="enabled: false"
    >
      <a-sky color="#3F3B34"></a-sky>

      <a-entity id="meeting-world" visible="false">
        <!-- meeting room built by JS -->
      </a-entity>

      <a-entity light="type: ambient; color: #C8C2B4; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; color: #F5F0E6; intensity: 0.9" position="2 5 2"></a-entity>
      <a-entity light="type: point; color: #A89B7E; intensity: 0.25" position="0 3 -1"></a-entity>

      <a-camera id="camera" look-controls wasd-controls="enabled: false" position="0 1.45 1.6"></a-camera>
    </a-scene>

    <div id="overlay">
      <div class="hud-top">
        <button id="btn-exit" class="hud-btn" aria-label="Exit">×</button>
        <div class="hud-info">
          <span id="step-label">the raise</span>
          <span id="speaker-name">Alex</span>
          <span id="speaker-role">Your Manager</span>
        </div>
      </div>

      <div class="meters">
        <div class="meter">
          <label>Rapport <span id="rapport-val">50</span></label>
          <div class="meter-track"><div id="rapport-bar" class="meter-fill rapport"></div></div>
        </div>
        <div class="meter">
          <label>Clarity <span id="assert-val">50</span></label>
          <div class="meter-track"><div id="assert-bar" class="meter-fill assert"></div></div>
        </div>
      </div>

      <div id="choices-panel" class="dialogue-panel hidden">
        <div id="choices" class="choices"></div>
      </div>

      <div id="ending-panel" class="ending-panel hidden">
        <h2 id="ending-title">Complete</h2>
        <p id="ending-dialogue"></p>
        <p id="ending-summary"></p>
        <div class="ending-actions">
          <button id="btn-restart" class="btn">Try again</button>
          <button id="btn-exit-end" class="btn subtle" onclick="document.getElementById('btn-exit').click()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/mii-character.js"></script>
  <script src="js/scenario.js"></script>
  <script src="js/scene-renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
